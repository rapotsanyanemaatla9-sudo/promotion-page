<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="styles.css">
     <style>
        body {
            display: flex;
            justify-content: left;
            align-items: left;
            height: 100vh;
            background-color: #d4d2d2;
        }
        form {
            width: 100%;
            max-width: 600px;
            background-color: #656978;
            border: 10px;
            padding: 20px;
        }
        fieldset {
            border-radius: 3 px;
            border-color: #1d2d43;
            padding: 10px
        }
        legend {
            font-weight: bold;
            font-style: italic;
            margin-bottom: 10px ;
        }
        label {
            font-weight: bold;
            margin-bottom: 6px;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #d4d2d2;
            border-radius: border-box;
        }
            .region-division {
                margin-bottom: 10px;
            }
            .region-division label {
                margin-left: 5px;
                display: block;
            }
            .region-division input[type="checkbox"] {
                margin-left: 8px;
                vertical-align: middle;
            }
            input[type="submit"] {
                background-color: #1d2d43;
                color: white;
                border: none;
                padding: 10px 20px;
                cursor: pointer;
            }
            input[type="submit"]:hover {
                background-color: #3a4a63;
            }   
    </style>
</head>
<body>
    <h1>Forgot Password</h1>
    <p>Please enter your email address to reset your password:</p>
    <form action="resetpassword.html" method="POST">
        <fieldset>
            <legend>Reset Password</legend>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br>
        <label for="password">New Password:</label><br>
        <input type="password" id="password" name="password"><br>
        <label for="confirm_password">Confirm New Password:</label><br>
        <input type="confirm_password" id="confirm_passowrd" name="confirm_password"><br>
        </fieldset>
        <input type="submit" value="Reset Password">
    </form>
<footer>
    <p>&copy 2026 Ryder Digitals. All rights reserved.</p>
</footer>
</body>
</html>
