<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <button type="Reset Password" class="btn" onclick="openPopup()"></button>
        <div class="popup" id="popup">
        <h2>New password set!</h2>
        <p>You have successfully changed your password. Welcome to Ryder Digitals!</p>
        <button type="button" onclick="closePopup()">Reset Password</button>
        </div>
    </div>
</html>
